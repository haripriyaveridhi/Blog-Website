<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pink Panorama | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;

      /* 🔽 If you want a background image later, paste URL here */
      /* background-image: url("PASTE_IMAGE_URL_HERE"); */

      background: linear-gradient(135deg, #ffe6f0, #ffffff);
      background-size: cover;
      background-position: center;
    }

    .login-container {
      min-height: 100vh;
    }

    .login-card {
      background-color: #fff0f7;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(255, 182, 217, 0.4);
    }

    .brand-title {
      text-align: center;
      font-weight: 600;
      color: #6b004f;
    }

    .brand-sub {
      text-align: center;
      color: #9b5b84;
      margin-bottom: 30px;
    }

    .btn-login {
      background-color: #ff6fb1;
      color: white;
      border-radius: 25px;
      border: none;
    }

    .btn-login:hover {
      background-color: #ff4f9a;
    }

    .social-btn {
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .divider {
      text-align: center;
      color: #b5769e;
      margin: 20px 0;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <div class="container login-container d-flex justify-content-center align-items-center">
    <div class="col-md-4">

      <div class="login-card">
        <h2 class="brand-title">🌸 Pink Panorama</h2>
        <p class="brand-sub">Welcome back, sweet soul🩷</p>

        <form onsubmit="loginUser(event)">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-login w-100 mb-3">
            Sign In
          </button>

          <div class="divider">or continue with</div>

          <div class="d-grid gap-2">

  <!-- Google -->
  <button type="button" class="btn btn-light social-btn d-flex align-items-center justify-content-center gap-2"
          onclick="socialLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.3 0 6.3 1.1 8.6 3.2l6.4-6.4C34.9 2.4 29.8 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.5 5.8C12 13.4 17.5 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-2.8-.4-4H24v7.6h12.7c-.3 2-1.9 5-5.4 7l8.3 6.4c4.9-4.5 7.5-11.1 7.5-17z"/>
      <path fill="#FBBC05" d="M10.1 28.7c-.5-1.4-.8-2.9-.8-4.5s.3-3.1.8-4.5l-7.5-5.8C.9 17.4 0 20.6 0 24.2s.9 6.8 2.6 9.3l7.5-5.8z"/>
      <path fill="#34A853" d="M24 48c6.5 0 12-2.1 16-5.8l-8.3-6.4c-2.2 1.5-5 2.5-7.7 2.5-6.5 0-12-3.9-13.9-9.5l-7.5 5.8C6.5 42.6 14.6 48 24 48z"/>
    </svg>
    Login with Google
  </button>

  <!-- Facebook -->
  <button type="button" class="btn btn-light social-btn d-flex align-items-center justify-content-center gap-2"
          onclick="socialLogin()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
      <path d="M22.7 0H1.3C.6 0 0 .6 0 1.3v21.4C0 23.4.6 24 1.3 24h11.5v-9.3H9.7V11h3.1V8.3c0-3.1 1.9-4.8 4.7-4.8 1.3 0 2.7.2 2.7.2v3h-1.5c-1.5 0-2 .9-2 1.9V11h3.4l-.5 3.7h-2.9V24h5.7c.7 0 1.3-.6 1.3-1.3V1.3C24 .6 23.4 0 22.7 0z"/>
    </svg>
    Login with Facebook
  </button>

  <!-- Microsoft -->
  <button type="button" class="btn btn-light social-btn d-flex align-items-center justify-content-center gap-2"
          onclick="socialLogin()">
    <svg width="18" height="18" viewBox="0 0 23 23">
      <rect fill="#F25022" x="1" y="1" width="10" height="10"/>
      <rect fill="#7FBA00" x="12" y="1" width="10" height="10"/>
      <rect fill="#00A4EF" x="1" y="12" width="10" height="10"/>
      <rect fill="#FFB900" x="12" y="12" width="10" height="10"/>
    </svg>
    Login with Microsoft
  </button>

</div>

        </form>
      </div>

    </div>
  </div>

  <script>
    function loginUser(event) {
      event.preventDefault();
      window.location.href = "home.html";
    }

    function socialLogin() {
      window.location.href = "home.html";
    }
  </script>

</body>
</html>
